name: 🚀 Deploy Frontend to GitHub Pages

# Builds the fully-static frontend (marketing homepage + the client-rendered
# check/results SPA) and deploys it to GitHub Pages. The API is NOT part of this
# build — it lives on Fly.io and is reached cross-origin via PUBLIC_API_ENDPOINT.
# This keeps all bot/crawler traffic on Pages' free CDN; Fly only wakes for real
# check requests.

on:
  push:
    branches: ['master']
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  # Static build, served from the /web-check sub-path on GitHub Pages.
  PLATFORM: static
  OUTPUT: static
  BASE_URL: /web-check
  SITE_URL: https://utogglin.github.io
  # Keep the marketing homepage at / (don't redirect to /check)
  BOSS_SERVER: 'true'
  # Pre-render the /check shell + emit the SPA 404 fallback (no server runtime)
  PUBLIC_BUILD_STATIC: 'true'
  # The API lives on Fly.io — point the client at it (CORS-enabled there)
  PUBLIC_API_ENDPOINT: https://your-web-check-app.fly.dev/api

jobs:
  build:
    name: 🏗️ Build static site
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: 📦 Install Dependencies
        run: yarn install --frozen-lockfile

      - name: 🏗️ Build
        run: yarn build

      - name: 🚫 Disable Jekyll (keep _astro/ assets)
        run: touch dist/.nojekyll

      - name: ⚙️ Configure Pages
        uses: actions/configure-pages@v5

      - name: ⬆️ Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: 🚀 Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
